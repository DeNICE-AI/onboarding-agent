version: '3.8'

services:
  solv-agent:
    build: .
    container_name: solv-agent
    network_mode: host
    volumes:
      - ./data:/app/data
      - ./rag:/app/rag
      - ./.env:/app/.env
    environment:
      - N8N_WEBHOOK_URL=http://127.0.0.1:5678/webhook/ticket
      - OLLAMA_BASE_URL=http://127.0.0.1:11434
      - LLM_MODEL=${LLM_MODEL:-gemma4:e4b}
      - OLLAMA_KEEP_ALIVE=${OLLAMA_KEEP_ALIVE:-0}
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    network_mode: host
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_FLASH_ATTENTION=false
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: n8n
    network_mode: host
    volumes:
      - n8n_data:/home/node/.n8n
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - N8N_SECURE_COOKIE=false
    restart: unless-stopped

volumes:
  n8n_data:
  ollama_data:
