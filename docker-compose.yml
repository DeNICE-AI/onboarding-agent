version: '3.8'

services:
  solv-agent:
    build: .
    container_name: solv-agent
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./rag:/app/rag
      - ./.env:/app/.env
    environment:
      - N8N_WEBHOOK_URL=http://n8n:5678/webhook/ticket
      - OLLAMA_BASE_URL=http://ollama:11434
    restart: unless-stopped
    depends_on:
      - n8n
      - ollama

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: n8n
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - N8N_SECURE_COOKIE=false
    restart: unless-stopped

volumes:
  n8n_data:
  ollama_data:
